<!DOCTYPE html> <html lang="ja"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>The Masterpiece - High Fidelity</title> <style> :root { --bg: #050505; --accent: #00ffcc; } body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', sans-serif; } #container { position: relative; border: 1px solid #222; cursor: pointer; } canvas { display: block; filter: contrast(1.1) brightness(1.05); } #ui { position: absolute; top: 30px; left: 30px; color: white; pointer-events: none; } .status { font-size: 10px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; } .phase { font-size: 24px; font-weight: 200; opacity: 0.9; } #loading-overlay { position: absolute; color: #444; font-size: 12px; } </style> </head> <body> <div id="loading-overlay">Initializing Visual Engine...</div> <div id="container"> <canvas id="paintCanvas"></canvas> <div id="ui"> <div class="status" id="statusText">System Ready</div> <div class="phase" id="phaseText">Preparing Canvas...</div> </div> </div> <script> const canvas = document.getElementById('paintCanvas'); const ctx = canvas.getContext('2d', { willReadFrequently: true }); const phaseText = document.getElementById('phaseText'); const statusText = document.getElementById('statusText'); const loadingOverlay = document.getElementById('loading-overlay'); const IMAGE_URL = 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2000'; let width, height, imgData; let isStarted = false; const PHASES = [ { name: 'Underdrawing', area: 'all', density: 800, brushSize: 2, alpha: 0.05, duration: 20 }, { name: 'Mountain Mass', area: 'top', density: 1500, brushSize: 12, alpha: 0.2, duration: 60 }, { name: 'Forest Layers', area: 'middle', density: 1800, brushSize: 7, alpha: 0.4, duration: 80 }, { name: 'Water Reflection', area: 'bottom', density: 1800, brushSize: 5, alpha: 0.5, duration: 60 }, { name: 'High-Fidelity Finish', area: 'all', density: 3000, brushSize: 1.5, alpha: 0.8, duration: 80 } ]; let currentPhase = 0; let frame = 0; function init() { const winW = window.innerWidth * 0.85; const winH = window.innerHeight * 0.85; const aspect = 16 / 9; if (winW / winH > aspect) { height = Math.floor(winH); width = Math.floor(height * aspect); } else { width = Math.floor(winW); height = Math.floor(width / aspect); } canvas.width = width; canvas.height = height; ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, width, height); loadingOverlay.style.display = 'none'; } const masterImg = new Image(); masterImg.crossOrigin = "Anonymous"; masterImg.src = IMAGE_URL; masterImg.onload = () => { statusText.innerText = "Buffer Loaded"; init(); startPainting(); }; async function startPainting() { if (isStarted || !masterImg.complete) return; isStarted = true; const tempCanvas = document.createElement('canvas'); tempCanvas.width = width; tempCanvas.height = height; const tCtx = tempCanvas.getContext('2d'); tCtx.drawImage(masterImg, 0, 0, width, height); imgData = tCtx.getImageData(0, 0, width, height).data; requestAnimationFrame(animate); } function getPixelColor(x, y) { const ix = Math.floor(x); const iy = Math.floor(y); if (ix < 0 || ix >= width || iy < 0 || iy >= height) { return { r: 0, g: 0, b: 0 }; } const idx = (iy * width + ix) * 4; return { r: imgData[idx] || 0, g: imgData[idx + 1] || 0, b: imgData[idx + 2] || 0 }; } function drawStroke(x, y, size, color, alpha) { if (color.r === undefined) return; ctx.save(); ctx.beginPath(); const grad = ctx.createRadialGradient(x, y, 0, x, y, size); grad.addColorStop(0, `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha})`); grad.addColorStop(1, `rgba(${color.r}, ${color.g}, ${color.b}, 0)`); ctx.fillStyle = grad; const jitterX = (Math.random() - 0.5) * 2; const jitterY = (Math.random() - 0.5) * 2; ctx.arc(x + jitterX, y + jitterY, size, 0, Math.PI * 2); ctx.fill(); ctx.restore(); } function animate() { const phase = PHASES[currentPhase]; phaseText.innerText = phase.name; statusText.innerText = `Rendering... ${((frame / phase.duration) * 100).toFixed(0)}%`; for (let i = 0; i < phase.density; i++) { let x = Math.random() * width; let y; if (phase.area === 'top') y = Math.random() * (height * 0.55); else if (phase.area === 'middle') y = (height * 0.4) + Math.random() * (height * 0.4); else if (phase.area === 'bottom') y = (height * 0.6) + Math.random() * (height * 0.4); else y = Math.random() * height; const color = getPixelColor(x, y); const dynamicSize = phase.brushSize * (0.4 + Math.random() * 1.2); drawStroke(x, y, dynamicSize, color, phase.alpha); } frame++; if (frame > phase.duration) { frame = 0; currentPhase++; } if (currentPhase < PHASES.length) { requestAnimationFrame(animate); } else { statusText.innerText = "Completed"; phaseText.innerText = "Nature's Sanctuary"; ctx.globalAlpha = 0.1; ctx.drawImage(masterImg, 0, 0, width, height); drawSignature(); } } function drawSignature() { ctx.save(); ctx.globalAlpha = 1.0; ctx.font = "italic bold 36px 'Brush Script MT', 'cursive', 'Georgia'"; ctx.textAlign = "right"; ctx.shadowColor = "rgba(0,0,0,0.5)"; ctx.shadowBlur = 4; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2; ctx.fillStyle = "#fffdf0"; ctx.fillText("mino", width - 40, height - 40); ctx.beginPath(); ctx.strokeStyle = "#fffdf0"; ctx.lineWidth = 2; ctx.moveTo(width - 120, height - 35); ctx.lineTo(width - 35, height - 35); ctx.stroke(); ctx.restore(); } window.addEventListener('resize', () => { if(!isStarted) init(); }); </script> </body> </html>
